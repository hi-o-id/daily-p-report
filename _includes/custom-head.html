{%- comment -%}
  Custom GA4 tracking snippet.
  Set `ga_tracking_id` in `_config.yml`, e.g. `G-XXXXXXXXXX`.
{%- endcomment -%}

{%- if jekyll.environment == 'production' and site.ga_tracking_id -%}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga_tracking_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.ga_tracking_id }}');
  </script>
{%- endif -%}
