title: 专利 D 早报
description: 设计和硬件相关的专利，来自 Apple 等公司
theme: minima


# 构建设置
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-archives  # 启用归档插件

# 归档插件配置
jekyll-archives:
  enabled: 
    - year
    - month
    - tags
  layout: archive
  permalinks:
    year: '/archive/:year/'
    month: '/archive/:year/:month/'
    tag: '/tag/:name/'

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: ""

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
